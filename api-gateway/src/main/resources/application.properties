spring.application.name=api-gateway
server.port=8080

eureka.client.service-url.defaultZone=http://localhost:8761/eureka/

logging.level.root=INFO
logging.level.org.springframework.cloud.gateway.route.RouteDefinitionLocator=INFO
logging.level.org.springframework.cloud.gateway=TRACE

spring.cloud.gateway.server.webmvc.routes[0].id=movie-service
spring.cloud.gateway.server.webmvc.routes[0].uri=lb://movie-service
spring.cloud.gateway.server.webmvc.routes[0].predicates[0]=Path=/api/movie/**

spring.cloud.gateway.server.webmvc.routes[1].id=theatre-service
spring.cloud.gateway.server.webmvc.routes[1].uri=lb://theatre-service
spring.cloud.gateway.server.webmvc.routes[1].predicates[0]=Path=/api/theatre/**

spring.cloud.gateway.server.webmvc.routes[2].id=city-service
spring.cloud.gateway.server.webmvc.routes[2].uri=lb://theatre-service
spring.cloud.gateway.server.webmvc.routes[2].predicates[0]=Path=/api/city/**

spring.cloud.gateway.server.webmvc.routes[3].id=screen-service
spring.cloud.gateway.server.webmvc.routes[3].uri=lb://theatre-service
spring.cloud.gateway.server.webmvc.routes[3].predicates[0]=Path=/api/screen/**

spring.cloud.gateway.server.webmvc.routes[4].id=seat-service
spring.cloud.gateway.server.webmvc.routes[4].uri=lb://theatre-service
spring.cloud.gateway.server.webmvc.routes[4].predicates[0]=Path=/api/seat/**

spring.cloud.gateway.default-filters[0]=TokenRelay

spring.security.oauth2.client.registration.keycloak.client-id=movie-booking-client
spring.security.oauth2.client.registration.keycloak.client-secret=NBSoHaQzumKP1Uo5zB0hP8MSJ12zAjeI
spring.security.oauth2.client.registration.keycloak.scope=open_id
spring.security.oauth2.client.registration.keycloak.authorization-grant-type=client_credentials
spring.security.oauth2.client.provider.keycloak.token-uri=http://localhost:8181/realms/movie-booking-realm/protocol/openid-connect/token
spring.security.oauth2.client.provider.keycloak.issuer-uri=http://localhost:8181/realms/movie-booking-realm

spring.security.oauth2.resourceserver.jwt.issuer-uri=http://localhost:8181/realms/movie-booking-realm


management.tracing.sampling.probability=1.0
management.zipkin.tracing.endpoint=http://localhost:9411