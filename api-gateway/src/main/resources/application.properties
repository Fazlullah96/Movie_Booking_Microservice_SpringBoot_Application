spring.application.name=api-gateway
server.port=8080

eureka.client.service-url.defaultZone=http://localhost:8761/eureka/

logging.level.root=INFO
logging.level.org.springframework.cloud.gateway.route.RouteDefinitionLocator=INFO
logging.level.org.springframework.cloud.gateway=TRACE

spring.cloud.gateway.server.webmvc.routes[0].id=movie-service
spring.cloud.gateway.server.webmvc.routes[0].uri=lb://movie-service
spring.cloud.gateway.server.webmvc.routes[0].predicates[0]=Path=/api/movie/**

spring.cloud.gateway.server.webmvc.routes[1].id=theatre-service
spring.cloud.gateway.server.webmvc.routes[1].uri=lb://theatre-service
spring.cloud.gateway.server.webmvc.routes[1].predicates[0]=Path=/api/theatre/**

spring.cloud.gateway.server.webmvc.routes[2].id=city-route
spring.cloud.gateway.server.webmvc.routes[2].uri=lb://theatre-service
spring.cloud.gateway.server.webmvc.routes[2].predicates[0]=Path=/api/city/**


management.tracing.sampling.probability=1.0
management.zipkin.tracing.endpoint=http://localhost:9411