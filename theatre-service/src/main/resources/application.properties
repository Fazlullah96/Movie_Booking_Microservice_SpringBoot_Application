spring.application.name=theatre-service
server.port=0

eureka.client.service-url.defaultZone=http://localhost:8761/eureka/

logging.level.com.example=INFO
logging.level.root=INFO

spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.url=jdbc:mysql://localhost:3306/theatre-service
spring.datasource.username=root
spring.datasource.password=ROOT1234

spring.jpa.show-sql=true
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

spring.redis.host=localhost
spring.redis.port=6379

spring.security.oauth2.resourceserver.jwt.issuer-uri=http://localhost:8181/realms/movie-booking-realm

management.tracing.sampling.probability=1.0
management.zipkin.tracing.endpoint=http://localhost:9411